# Copy to config/config.yaml for local development if you want file-based config.
# This file is safe to commit because it contains placeholders only.

app:
  environment: development
  http_addr: ":8080"
  public_base_url: "http://localhost:8080"
  public_hostname: "localhost"
  http_timeout: "5s"

owner:
  # Do not hard-code personal details in source code.
  display_name: "Your Name"
  timezone: "Europe/London"

event:
  name: "Electromagnetic Field"
  short_name: "EMF"
  timezone: "Europe/London"
  # Set these when the event dates are fixed for the deployment.
  starts_at: ""
  ends_at: ""

database:
  # Safe placeholder only. Put real production credentials in ignored config
  # or your deployment secret store.
  url: "postgres://emf_dashboard:change-me-local-only@postgres:5432/emf_dashboard?sslmode=disable"

external_apis:
  emf:
    base_url: "https://www.emfcamp.org"
    token: ""
    # Full favourites JSON URL, including token. Do not commit a real value.
    favourites_url: ""
    cache_interval: "30m"
    request_timeout: "5s"
  bar:
    enabled: true
    # Test service before the event; switch to https://bar.emf.camp when live.
    base_url: "https://emftill.assorted.org.uk"
    poll_interval: "30m"
  weather:
    enabled: false
    base_url: "https://api.open-meteo.com"
    location: "Eastnor Deer Park"
    latitude: 52.0367
    longitude: -2.3918
    cache_interval: "30m"
  home_assistant:
    enabled: false
    base_url: "https://home-assistant.example.com"
    # Create a long-lived access token from your Home Assistant profile.
    access_token: ""
    cache_interval: "30m"
    metrics:
      - label: "Steps Today"
        entity_id: "sensor.pixel_8_pro_steps_sensor"
        mode: "daily_delta"
        unit: "steps"
      - label: "Daily Distance"
        entity_id: "sensor.pixel_8_pro_daily_distance"
        unit: "m"
      - label: "Phone Battery"
        entity_id: "sensor.pixel_8_pro_battery_level"
        display: "progress"
        unit: "%"
      - label: "Battery State"
        entity_id: "sensor.pixel_8_pro_battery_state"

telegram:
  enabled: false
  bot_token: ""
  allowed_chat_ids: []
  poll_interval: "2s"
  miniblog:
    max_length: 140
    dashboard_limit: 8

features:
  talks_sync: true
  reminders: true
  telegram_bot: false

domain:
  # Caddy serves this hostname and its wildcard sibling:
  #   emf.example.com
  #   *.emf.example.com
  hostname: "emf.example.com"
  dashboard_hostname: "dashboard.emf.example.com"
  dns_provider: "cloudflare"
  cloudflare:
    # Needs Cloudflare Zone:DNS:Edit and Zone:Zone:Read for the relevant zone.
    # Keep the real value only in ignored local config or a deployment secret.
    api_token: ""
