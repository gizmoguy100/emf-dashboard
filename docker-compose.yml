services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_CONFIG_FILE: ${APP_CONFIG_FILE:-/app/config/config.yaml}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emf_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-emf_dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Production note:
  # Put Caddy, Traefik, nginx, or your platform ingress in front of app:8080.
  # Keep TLS certificates and production hostnames outside this public repo.

volumes:
  postgres-data:
