services:
  caddy:
    build:
      context: ./deployments/caddy
      dockerfile: Dockerfile
    environment:
      APP_CONFIG_FILE: ${APP_CONFIG_FILE:-/app/config/config.yaml}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-}
    depends_on:
      app:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./config:/app/config:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_CONFIG_FILE: ${APP_CONFIG_FILE:-/app/config/config.yaml}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_HTTP_BIND:-127.0.0.1}:${APP_HTTP_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emf_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-emf_dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
